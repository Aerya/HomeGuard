services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: homeguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Paris
      # Adresse publique de ce serveur VPN (domaine ou IP) — c'est ce que le smartphone compose pour se connecter
      - SERVERURL=homeguard.mondomaine.com
      # Port UDP a ouvrir et rediriger vers ce serveur dans la box / routeur
      - SERVERPORT=51820
      # Noms des clients (un par appareil, virgule pour en ajouter)
      - PEERS=iphone
      # Serveur DNS utilise par les clients VPN (AdGuard Home, Pi-hole...) + fallback
      - PEERDNS=192.168.0.64,9.9.9.9
      - INTERNAL_SUBNET=10.13.13.0
      # Tout le trafic passe par le VPN (= tout le DNS passe par AdGuard Home)
      - ALLOWEDIPS=0.0.0.0/0,::/0
      - LOG_CONFS=true
    volumes:
      - ./config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - 51820:51820/udp
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  peer-notify:
    image: alpine
    container_name: wireguard-notify
    depends_on:
      - wireguard
    environment:
      # Laisser vide pour desactiver l'envoi Discord
      - DISCORD_WEBHOOK=
      # Peers a envoyer (meme valeur que PEERS ci-dessus)
      - PEERS=iphone
    volumes:
      - ./config:/config:ro
    restart: "no"
    command: >
      sh -c "
        apk add --no-cache qrencode curl > /dev/null 2>&1 &&
        sleep 5 &&
        for PEER in $(echo $PEERS | tr ',' ' '); do
          CONF=/config/peer_$${PEER}/peer_$${PEER}.conf &&
          echo '=== '$${PEER}' ===' &&
          qrencode -t UTF8 -r $${CONF} &&
          if [ -n \"$${DISCORD_WEBHOOK}\" ]; then
            qrencode -t PNG -r $${CONF} -o /tmp/$${PEER}.png &&
            curl -sF \"content=Config WireGuard — peer : **$${PEER}**\" -F \"file=@/tmp/$${PEER}.png\" \"$${DISCORD_WEBHOOK}\" > /dev/null &&
            echo 'Envoye sur Discord.'
          fi
        done
      "
